<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room — Doordarshan</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      body {
        overflow: hidden;
      }
      .ctrl-icon {
        font-size: 1.25rem;
        line-height: 1;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
        border-radius: inherit;
        display: block;
      }
      .video-tile {
        position: relative;
        background: #111;
        border-radius: 8px;
        overflow: hidden;
      }
      .video-tile .tile-label {
        position: absolute;
        bottom: 8px;
        left: 10px;
        font-size: 0.75rem;
        color: #fff;
        background: rgba(0, 0, 0, 0.5);
        padding: 2px 8px;
        border-radius: 4px;
        pointer-events: none;
      }
      .video-tile .tile-muted-icon {
        position: absolute;
        bottom: 8px;
        right: 10px;
        font-size: 0.85rem;
        display: none;
      }
      .video-tile.muted .tile-muted-icon {
        display: block;
      }
      .video-tile .tile-avatar {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        background: #1a1a2e;
        display: none;
      }
      .video-tile.cam-off .tile-avatar {
        display: flex;
      }
      .video-tile.cam-off video {
        visibility: hidden;
      }
      .video-grid {
        display: grid;
        width: 100%;
        height: 100%;
        gap: 8px;
        padding: 8px;
        box-sizing: border-box;
      }
      .video-grid.count-1 {
        grid-template-columns: 1fr;
      }
      .video-grid.count-2 {
        grid-template-columns: 1fr 1fr;
      }
      .video-grid.count-3 {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
      }
      .video-grid.count-3 .video-tile:first-child {
        grid-column: 1 / -1;
      }
      .video-grid.count-4 {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
      }
      .video-grid.count-5,
      .video-grid.count-6 {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
      }
    </style>
  </head>
  <body>
    <div class="room-page">
      <header class="room-topbar">
        <div class="room-topbar-left">
          <a
            href="dashboard"
            class="brand"
            style="font-size: 0.9rem; gap: 0.4rem"
          >
            <div
              class="brand-icon"
              style="width: 22px; height: 22px; font-size: 0.7rem"
            >
              📡
            </div>
            DD
          </a>
          <div>
            <div class="room-name" id="room-name">Loading…</div>
            <div
              class="topbar-code"
              id="topbar-code"
              title="Click to copy room code"
            >
              <span class="code-text" style="font-size: 0.75rem">—</span>
              <span style="font-size: 0.7rem; color: var(--text-faint)">⧉</span>
            </div>
          </div>
        </div>

        <div class="room-topbar-right">
          <div class="ws-status connecting" id="ws-status">
            <div class="ws-dot"></div>
            <span id="ws-status-text">Connecting…</span>
          </div>
          <div
            style="
              display: flex;
              align-items: center;
              gap: 0.35rem;
              font-size: 0.8125rem;
              color: var(--text-muted);
              margin-left: 0.5rem;
            "
          >
            👤 <span id="participant-count">0</span>
          </div>
        </div>
      </header>

      <div
        id="media-perm-banner"
        class="media-perm-banner"
        style="display: none"
      >
        <div class="perm-banner-icon">🎥</div>
        <div class="perm-banner-body">
          <strong>Camera &amp; microphone blocked</strong>
          <span class="perm-msg"
            >Allow access in your browser to join with video and audio.</span
          >
        </div>
        <button class="btn btn-primary btn-sm" id="perm-retry-btn">
          Try again
        </button>
        <button class="btn btn-secondary btn-sm" id="perm-dismiss-btn">
          Dismiss
        </button>
      </div>

      <div class="room-body">
        <div class="video-area">
          <div class="video-grid count-1" id="video-grid"></div>

          <div class="controls-bar">
            <button class="ctrl-btn" id="ctrl-mute" title="Mute/Unmute">
              <span class="ctrl-icon">🎤</span>
              <span class="ctrl-label">Mute</span>
            </button>
            <button class="ctrl-btn" id="ctrl-camera" title="Camera on/off">
              <span class="ctrl-icon">📹</span>
              <span class="ctrl-label">Camera</span>
            </button>
            <button class="ctrl-btn" id="ctrl-share" title="Share your screen">
              <span class="ctrl-icon">🖥</span>
              <span class="ctrl-label">Share</span>
            </button>
            <button class="ctrl-btn active" id="ctrl-chat" title="Toggle chat">
              <span class="ctrl-icon">💬</span>
              <span class="ctrl-label">Chat</span>
              <span
                id="chat-unread-badge"
                class="chat-unread-badge"
                style="display: none"
              ></span>
            </button>
            <button
              class="ctrl-btn ctrl-btn-leave"
              id="ctrl-leave"
              title="Leave room"
            >
              <span class="ctrl-icon">📴</span>
              <span class="ctrl-label">Leave</span>
            </button>
          </div>
        </div>

        <aside class="room-sidebar" id="room-sidebar">
          <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="participants">
              People
            </button>
            <button class="sidebar-tab" data-tab="chat">Chat</button>
          </div>

          <div class="sidebar-panel" data-panel="participants">
            <div class="participants-list" id="participants-list"></div>
          </div>

          <div class="sidebar-panel hidden" data-panel="chat">
            <div class="chat-messages" id="chat-messages">
              <div class="chat-system-msg">
                Messages are end-to-end within this session.
              </div>
            </div>
            <div class="chat-input-area">
              <textarea
                class="chat-textarea"
                id="chat-textarea"
                rows="1"
                placeholder="Send a message… (Enter to send)"
                maxlength="4096"
              ></textarea>
              <button
                class="btn btn-primary btn-sm"
                id="chat-send-btn"
                aria-label="Send"
              >
                ↑
              </button>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <div id="toast-container"></div>

    <script>
      window.RoomUI = {
        addTile: function ({ id, stream, label, muted, camOff, isLocal }) {
          const grid = document.getElementById("video-grid");

          const existing = document.getElementById("tile-" + id);
          if (existing) {
            window.RoomUI.updateTile(id, { stream, muted, camOff });
            return;
          }

          const tile = document.createElement("div");
          tile.className =
            "video-tile" + (muted ? " muted" : "") + (camOff ? " cam-off" : "");
          tile.id = "tile-" + id;

          const video = document.createElement("video");
          video.autoplay = true;
          video.playsinline = true;
          video.muted = !!isLocal;

          if (stream) {
            video.srcObject = stream;
          }

          const avatar = document.createElement("div");
          avatar.className = "tile-avatar";
          avatar.textContent = (label || "U")[0].toUpperCase();

          const labelEl = document.createElement("div");
          labelEl.className = "tile-label";
          labelEl.textContent = isLocal ? "You" : label || "Participant";

          const mutedIcon = document.createElement("div");
          mutedIcon.className = "tile-muted-icon";
          mutedIcon.textContent = "🔇";

          tile.appendChild(video);
          tile.appendChild(avatar);
          tile.appendChild(labelEl);
          tile.appendChild(mutedIcon);
          grid.appendChild(tile);

          window.RoomUI.refreshGridCount();

          video.play().catch(function () {
            tile.addEventListener(
              "click",
              function () {
                video.play();
              },
              { once: true },
            );
          });
        },

        removeTile: function (id) {
          const tile = document.getElementById("tile-" + id);
          if (tile) {
            tile.remove();
            window.RoomUI.refreshGridCount();
          }
        },

        updateTile: function (id, { stream, muted, camOff }) {
          const tile = document.getElementById("tile-" + id);
          if (!tile) return;

          const video = tile.querySelector("video");
          if (stream && video.srcObject !== stream) {
            video.srcObject = stream;
            video.play().catch(function () {});
          }
          if (typeof muted === "boolean") tile.classList.toggle("muted", muted);
          if (typeof camOff === "boolean")
            tile.classList.toggle("cam-off", camOff);
        },

        refreshGridCount: function () {
          const grid = document.getElementById("video-grid");
          const count = grid.querySelectorAll(".video-tile").length;
          grid.className =
            "video-grid count-" + Math.max(1, Math.min(count, 6));
          document.getElementById("participant-count").textContent = count;
        },
      };

      document
        .getElementById("perm-dismiss-btn")
        .addEventListener("click", function () {
          document.getElementById("media-perm-banner").style.display = "none";
        });
    </script>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/websocket.js"></script>
    <script src="/js/media.js"></script>
    <script src="/js/webrtc.js"></script>
    <script src="/js/room.js"></script>
  </body>
</html>
